<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161922"/>
      <stop offset="100%" stop-color="#0C0E12"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0A040" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E0A040" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F0C060"/>
      <stop offset="100%" stop-color="#C08030"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="0" fill="url(#bg)"/>

  <!-- Subtle glow behind eye -->
  <circle cx="64" cy="64" r="52" fill="url(#glow)"/>

  <!-- Outer ring - surveillance/radar feel -->
  <circle cx="64" cy="64" r="42" stroke="#E0A040" stroke-width="1.5" fill="none" opacity="0.2"/>
  <circle cx="64" cy="64" r="48" stroke="#E0A040" stroke-width="0.75" fill="none" opacity="0.1"/>

  <!-- Tick marks around outer ring -->
  <g stroke="#E0A040" stroke-width="1" opacity="0.3">
    <line x1="64" y1="16" x2="64" y2="22"/>
    <line x1="64" y1="106" x2="64" y2="112"/>
    <line x1="16" y1="64" x2="22" y2="64"/>
    <line x1="106" y1="64" x2="112" y2="64"/>
  </g>

  <!-- Eye shape - almond/lens -->
  <path d="M 20 64 Q 64 28 108 64 Q 64 100 20 64 Z"
        fill="#E0A040" opacity="0.08" stroke="#E0A040" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Inner eye white area -->
  <path d="M 30 64 Q 64 38 98 64 Q 64 90 30 64 Z"
        fill="#161922" opacity="0.6"/>

  <!-- Iris -->
  <circle cx="64" cy="64" r="20" fill="url(#iris)" opacity="0.85"/>

  <!-- Iris detail rings -->
  <circle cx="64" cy="64" r="16" stroke="#0C0E12" stroke-width="0.5" fill="none" opacity="0.3"/>
  <circle cx="64" cy="64" r="12" stroke="#0C0E12" stroke-width="0.3" fill="none" opacity="0.2"/>

  <!-- Pupil -->
  <circle cx="64" cy="64" r="8" fill="#0C0E12"/>

  <!-- Pupil highlight -->
  <circle cx="60" cy="59" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="68" cy="62" r="1.5" fill="#fff" opacity="0.25"/>

  <!-- Top/bottom eyelid lines for definition -->
  <path d="M 20 64 Q 64 28 108 64" fill="none" stroke="#E0A040" stroke-width="2" opacity="0.7"/>
  <path d="M 20 64 Q 64 100 108 64" fill="none" stroke="#E0A040" stroke-width="2" opacity="0.7"/>
</svg>
